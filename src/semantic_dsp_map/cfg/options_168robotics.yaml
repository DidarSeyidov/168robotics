# Topics — match exactly what your nodes publish
depth_image_topic: /camera_depth_image
camera_pose_topic: /camera_pose
mask_group_topic: /mask_group_super_glued
frame_id: local_map

visualize_with_zero_center: false  # false = world coordinates, true = robot-centered
if_out_evaluation_format: false
if_output_freespace: true  # true = also publish free space cloud (useful for your use case)

# Dynamic vs static discrimination
# Lower beyesian_movement_probability_threshold = more sensitive to motion
beyesian_movement_distance_threshold: 0.2
beyesian_movement_decrement: 0.05
beyesian_movement_increment: 0.2
beyesian_movement_probability_threshold: 0.3

# Depth noise (lidar is more accurate than stereo — tighter values)
if_consider_depth_noise: true
if_use_independent_filter: false
depth_noise_model_first_order: 0.01  # lidar: tighter than ZED2's 0.02
depth_noise_model_zero_order: 0.1    # lidar: tighter than ZED2's 0.3

# Occupancy
occupancy_threshold: 0.15

# Tracking
match_score_threshold: 0.6
max_obersevation_lost_time: 20
nb_ptc_num_per_point: 1
noise_number: 0.2
detection_probability: 0.8

# Map memory
forgetting_rate: 1
max_forget_count: 5
id_transition_probability: 0.5